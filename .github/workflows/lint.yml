name: Build and Lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys
          
      - name: Syntax Check
        run: |
          # This verifies your Verilog code for syntax errors 
          # without attempting to map it to physical FPGA hardware
          yosys -p "read_verilog core.sv"
