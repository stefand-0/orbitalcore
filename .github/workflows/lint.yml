name: Build and Lint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FPGA Toolchain
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: 'latest'

      - name: Synthesis and Place & Route
        run: |
          # Synthesize
          yosys -p "read_verilog -sv main/core/core.sv; synth_gowin -top core; write_json design.json"
          
          # Place and route
          # Note: Ensure pins.cst exists in your repo or is created here
          nextpnr-himbaechel --device GW1N-1-LQ144 --json design.json --cst pins.cst --write bitstream.fasm

      - name: Upload Bitstream
        uses: actions/upload-artifact@v4
        with:
          name: bitstream
          path: bitstream.fasm
